name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to emit version-tuple for (backfill mode)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: "3.12"
      - name: Install build
        run: pip install build
      - name: Build
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4  # pinning deferred — no SHA provided
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}

      - name: Determine tag
        id: tag
        run: |
          TAG="${{ github.ref_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${{ steps.tag.outputs.tag }}" --repo continuonai/rcan-py >/dev/null 2>&1; then
            gh release create "${{ steps.tag.outputs.tag }}" \
              --repo continuonai/rcan-py \
              --title "rcan-py ${{ steps.tag.outputs.tag }}" \
              --generate-notes
          fi

      - uses: continuonai/rcan-spec/.github/actions/emit-version-tuple@v3.2.0
        with:
          project: rcan-py
          ran: ${{ secrets.RCAN_PY_RELEASE_RAN }}
          field: sdk_version_py
          value: ${{ steps.tag.outputs.version }}
          depends_on: '{"protocol_version":">=3.2.0"}'
          pq_signing_key: ${{ secrets.RCAN_PY_RELEASE_PQ_PRIV }}
          pq_kid: ${{ secrets.RCAN_PY_RELEASE_KID }}
          ed25519_signing_key: ${{ secrets.RCAN_PY_RELEASE_PRIV }}
          ed25519_kid: ${{ secrets.RCAN_PY_RELEASE_KID }}
          release_tag: ${{ steps.tag.outputs.tag }}

  backfill-emit:
    name: Emit signed version-tuple envelope (backfill)
    if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Determine tag
        id: tag
        run: |
          TAG="${{ inputs.tag }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${{ steps.tag.outputs.tag }}" --repo continuonai/rcan-py >/dev/null 2>&1; then
            gh release create "${{ steps.tag.outputs.tag }}" \
              --repo continuonai/rcan-py \
              --title "rcan-py ${{ steps.tag.outputs.tag }}" \
              --generate-notes
          fi

      - uses: continuonai/rcan-spec/.github/actions/emit-version-tuple@v3.2.0
        with:
          project: rcan-py
          ran: ${{ secrets.RCAN_PY_RELEASE_RAN }}
          field: sdk_version_py
          value: ${{ steps.tag.outputs.version }}
          depends_on: '{"protocol_version":">=3.2.0"}'
          pq_signing_key: ${{ secrets.RCAN_PY_RELEASE_PQ_PRIV }}
          pq_kid: ${{ secrets.RCAN_PY_RELEASE_KID }}
          ed25519_signing_key: ${{ secrets.RCAN_PY_RELEASE_PRIV }}
          ed25519_kid: ${{ secrets.RCAN_PY_RELEASE_KID }}
          release_tag: ${{ steps.tag.outputs.tag }}
