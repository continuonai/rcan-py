name: Spec Compatibility Smoke Test
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-python@0b93645e9fea7318ecaed2DCAA3f393817b4e60 # v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install -e ".[dev]" pyyaml 2>/dev/null || pip install -e "." pyyaml

      - name: Validate against live canonical schemas
        run: |
          python - << 'PYEOF'
          import sys
          from rcan.validate import validate_config
          import yaml

          # Test validate against fixture
          with open('tests/fixtures/sample.rcan.yaml') as f:
              config = yaml.safe_load(f)
          result = validate_config(config)
          valid = result.ok if hasattr(result, 'ok') else result[0]
          errors = result.issues if hasattr(result, 'issues') else result[1]
          assert valid, f'Fixture invalid: {errors}'
          print('OK sample.rcan.yaml validates correctly')

          # Test canonical schema fetch (best-effort — network may be unavailable in CI)
          try:
              from rcan.validate import _fetch_canonical_schema
              schema = _fetch_canonical_schema('rcan-config.schema.json')
              if schema:
                  print('OK Canonical schema fetched from rcan.dev')
              else:
                  print('SKIP Could not fetch canonical schema (network unavailable)')
          except Exception as e:
              print(f'SKIP Schema fetch: {e}')

          # Test node manifest verification (best-effort)
          try:
              from rcan.node import NodeClient
              client = NodeClient()
              manifest = client.get_node_manifest('https://rcan-spec.pages.dev')
              ok = client.verify_node(manifest)
              if ok:
                  print(f'OK rcan.dev node manifest valid: {manifest["node_type"]}')
              else:
                  print('WARN Node manifest verification failed')
          except Exception as e:
              print(f'SKIP Node manifest check: {e}')

          print('Smoke test complete')
          PYEOF

      - name: Run full test suite
        run: python -m pytest tests/ -x -q
