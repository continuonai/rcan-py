name: Validate RCAN Config
description: Install rcan and validate .rcan.yaml files in your repository.

inputs:
  config-path:
    description: Glob pattern for RCAN config files to validate (default finds all *.rcan.yaml)
    required: false
    default: "**/*.rcan.yaml"
  level:
    description: Minimum conformance level required — 1, 2, or 3 (default 1)
    required: false
    default: "1"
  fail-on-warning:
    description: Fail the action on warnings as well as errors
    required: false
    default: "false"

outputs:
  result:
    description: Validation result — passed or failed
    value: ${{ steps.validate.outputs.result }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install rcan
      shell: bash
      run: pip install "rcan>=0.1.0"

    - name: Validate RCAN configs
      id: validate
      shell: bash
      run: |
        set +e
        FAILED=0
        CONFIGS=$(find . -name "*.rcan.yaml" -not -path "*/node_modules/*" -not -path "*/.git/*" 2>/dev/null)
        if [ -z "$CONFIGS" ]; then
          echo "ℹ️  No .rcan.yaml files found — skipping validation."
          echo "result=skipped" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        for f in $CONFIGS; do
          echo "::group::Validating $f"
          rcan-validate config "$f" --level ${{ inputs.level }}
          RC=$?
          if [ $RC -ne 0 ]; then
            FAILED=1
            echo "::error file=$f::RCAN validation failed (L${{ inputs.level }})"
          fi
          echo "::endgroup::"
        done
        if [ $FAILED -eq 1 ]; then
          echo "result=failed" >> "$GITHUB_OUTPUT"
          exit 1
        fi
        echo "result=passed" >> "$GITHUB_OUTPUT"
